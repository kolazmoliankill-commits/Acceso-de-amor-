<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Leslie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
        }

        /* VIDEO DE FONDO - SOLO PARA SEGURIDAD */
        #video-fondo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: opacity 1.5s ease;
        }

        /* CAPA OSCURA PARA QUE SE VEA EL TECLADO */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* CONTENEDOR PRINCIPAL DE SEGURIDAD */
        #escena-acceso {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1s ease;
        }

        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* TECLADO DE CRISTAL */
        .keypad-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .dots-container {
            display: flex; gap: 15px; justify-content: center; margin-bottom: 25px;
        }
        .dot { 
            width: 15px; height: 15px; border: 2px solid #ff4da6; 
            border-radius: 50%; transition: 0.3s; 
        }
        .dot.active { 
            background: #ff4da6; box-shadow: 0 0 15px #ff4da6; transform: scale(1.3); 
        }

        .teclas {
            display: grid; grid-template-columns: repeat(3, 75px); gap: 15px;
        }
        .tecla {
            width: 75px; height: 75px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; cursor: pointer; transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tecla:active { background: #ff4da6; transform: scale(0.9); border-color: white; }

        /* BOMBILLA DE PISTA */
        .hint-btn {
            position: absolute; top: 40px; right: 40px;
            font-size: 2rem; color: rgba(255,255,255,0.3);
            cursor: pointer; transition: 0.5s;
        }
        .hint-btn.on { color: #ffeb3b; text-shadow: 0 0 20px #ffeb3b; }

        /* ESCENA 2: LA PLAYA (OCULTA AL INICIO) */
        #escena-playa {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('playa.jpg');
            background-size: cover; background-position: center;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5;
            animation: zoomIn 10s infinite alternate;
        }
        @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.1); } }

        .btn-continuar {
            margin-top: 40px; padding: 15px 40px;
            background: #ff4da6; border: none; color: white;
            border-radius: 50px; font-weight: 600; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255, 77, 166, 0.4);
        }

        /* ANIMACIÓN DE ERROR */
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-fondo">
        <source src="flores.mp4" type="video/mp4">
    </video>
    <div class="overlay" id="capa-oscura"></div>

    <i class="fas fa-lightbulb hint-btn" id="luz" onclick="activarPista()"></i>

    <div id="escena-acceso">
        <h2>PORTAL PRIVADO</h2>
        <div class="keypad-box" id="caja">
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="teclas">
                <div class="tecla" onclick="inputNum(1)">1</div><div class="tecla" onclick="inputNum(2)">2</div><div class="tecla" onclick="inputNum(3)">3</div>
                <div class="tecla" onclick="inputNum(4)">4</div><div class="tecla" onclick="inputNum(5)">5</div><div class="tecla" onclick="inputNum(6)">6</div>
                <div class="tecla" onclick="inputNum(7)">7</div><div class="tecla" onclick="inputNum(8)">8</div><div class="tecla" onclick="inputNum(9)">9</div>
                <div></div><div class="tecla" onclick="inputNum(0)">0</div>
                <div class="tecla" onclick="borrar()"><i class="fas fa-backspace"></i></div>
            </div>
        </div>
    </div>

    <div id="escena-playa">
        <h1 style="font-size: 2.5rem; font-weight: 200; text-align: center;">"Escucha mi voz..."</h1>
        <p style="margin-top: 10px; opacity: 0.8;">Cierra los ojos y siente el mar.</p>
        <audio id="vocal" loop><source src="audio.mp3" type="audio/mpeg"></audio>
        <button class="btn-continuar" onclick="siguiente()">EXPLORAR RECUERDOS ➔</button>
    </div>

    <script>
        let code = "";
        const pass = "070226"; // TU FECHA

        function inputNum(n) {
            if (code.length < 6) {
                code += n;
                actualizarPuntos();
                if (code === pass) entrar();
                else if (code.length === 6) fallo();
            }
        }

        function actualizarPuntos() {
            const d = document.querySelectorAll('.dot');
            d.forEach((dot, i) => {
                if (i < code.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function borrar() {
            code = "";
            actualizarPuntos();
        }

        function activarPista() {
            document.getElementById('luz').classList.add('on');
            alert("Pista: El día que nuestra historia comenzó... (070226)");
        }

        function fallo() {
            document.getElementById('caja').classList.add('shake');
            setTimeout(() => {
                document.getElementById('caja').classList.remove('shake');
                borrar();
            }, 400);
        }

        function entrar() {
            // DESVANECER VIDEO Y ACCESO
            document.getElementById('video-fondo').style.opacity = "0";
            document.getElementById('capa-oscura').style.opacity = "0";
            document.getElementById('escena-acceso').style.opacity = "0";
            document.getElementById('escena-acceso').style.transform = "scale(0.9)";

            setTimeout(() => {
                document.getElementById('escena-acceso').style.display = "none";
                document.getElementById('video-fondo').style.display = "none";
                document.getElementById('escena-playa').style.display = "flex";
                document.getElementById('vocal').play();
            }, 1500);
        }

        function siguiente() {
            alert("Preparando los 3 objetos mágicos...");
        }
    </script>
</body>
</html>
