<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Leslie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            font-family: 'Quicksand', sans-serif; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
        }

        #video-fondo {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            transition: opacity 1.5s ease;
        }

        /* Capa para que el video no opaque la interfaz */
        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Oscurece un poco el video */
            z-index: 2;
        }

        #escena-acceso {
            position: relative; z-index: 10;
            height: 100vh; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center;
        }

        .titulo-amor {
            text-align: center; margin-bottom: 25px;
        }
        h2 { 
            font-weight: 700; letter-spacing: 3px; 
            color: #ff4da6; text-shadow: 0 0 15px rgba(255, 77, 166, 0.8);
        }
        .formato-guia {
            font-size: 0.7rem; color: #ffb3d9; letter-spacing: 2px; margin-top: 5px;
        }

        /* TECLADO COLOR AMOR */
        .keypad-box {
            background: rgba(40, 0, 20, 0.6); /* Tono rojizo oscuro traslúcido */
            backdrop-filter: blur(25px);
            padding: 30px; border-radius: 40px;
            border: 2px solid #ff4da6; /* Borde color amor */
            box-shadow: 0 0 30px rgba(255, 77, 166, 0.3);
            text-align: center;
        }

        .dots-container {
            display: flex; gap: 15px; justify-content: center; margin-bottom: 25px;
        }
        .dot { 
            width: 16px; height: 16px; border: 2px solid #ff4da6; 
            border-radius: 50%; transition: 0.3s; 
        }
        .dot.active { 
            background: #ff4da6; box-shadow: 0 0 15px #ff4da6; transform: scale(1.3); 
        }

        .teclas {
            display: grid; grid-template-columns: repeat(3, 75px); gap: 15px;
        }
        .tecla {
            width: 75px; height: 75px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; cursor: pointer; transition: 0.2s;
            border: 1px solid rgba(255, 77, 166, 0.2);
            color: white; font-weight: 500;
        }
        .tecla:active { background: #ff4da6; transform: scale(0.9); }

        /* BOMBILLA INTERACTIVA */
        .hint-btn {
            position: absolute; top: 40px; right: 40px;
            font-size: 2.2rem; color: rgba(255, 235, 59, 0.4);
            cursor: pointer; transition: 0.5s;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { opacity: 0.4; } to { opacity: 1; text-shadow: 0 0 10px #ffeb3b; } }
        .hint-btn.on { color: #ffeb3b; }

        /* ESCENA PLAYA */
        #escena-playa {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('playa.jpg');
            background-size: cover; background-position: center;
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5;
        }

        .btn-continuar {
            margin-top: 40px; padding: 15px 40px;
            background: #ff4da6; border: none; color: white;
            border-radius: 50px; font-weight: 600; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 166, 0.4);
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-fondo">
        <source src="flores.mp4" type="video/mp4">
    </video>
    <div class="overlay" id="capa-oscura"></div>

    <i class="fas fa-lightbulb hint-btn" id="luz" onclick="activarPista()"></i>

    <div id="escena-acceso">
        <div class="titulo-amor">
            <h2>NUESTRO INICIO</h2>
            <p class="formato-guia">Día / Mes / Año</p>
        </div>

        <div class="keypad-box" id="caja">
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="teclas">
                <div class="tecla" onclick="inputNum(1)">1</div><div class="tecla" onclick="inputNum(2)">2</div><div class="tecla" onclick="inputNum(3)">3</div>
                <div class="tecla" onclick="inputNum(4)">4</div><div class="tecla" onclick="inputNum(5)">5</div><div class="tecla" onclick="inputNum(6)">6</div>
                <div class="tecla" onclick="inputNum(7)">7</div><div class="tecla" onclick="inputNum(8)">8</div><div class="tecla" onclick="inputNum(9)">9</div>
                <div></div><div class="tecla" onclick="inputNum(0)">0</div>
                <div class="tecla" onclick="borrar()"><i class="fas fa-backspace"></i></div>
            </div>
        </div>
    </div>

    <div id="escena-playa">
        <h1 style="font-size: 2.2rem; text-align: center; font-weight: 300;">"Bienvenida a nuestro rincón..."</h1>
        <audio id="vocal" loop><source src="audio.mp3" type="audio/mpeg"></audio>
        <button class="btn-continuar" onclick="siguiente()">CONTINUAR ➔</button>
    </div>

    <script>
        let code = "";
        const pass = "070226"; 

        function inputNum(n) {
            if (code.length < 6) {
                code += n;
                actualizarPuntos();
                if (code === pass) entrar();
                else if (code.length === 6) fallo();
            }
        }

        function actualizarPuntos() {
            const d = document.querySelectorAll('.dot');
            d.forEach((dot, i) => {
                if (i < code.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function borrar() {
            code = "";
            actualizarPuntos();
        }

        function activarPista() {
            document.getElementById('luz').classList.add('on');
            alert("Recuerda: El día que nuestra historia comenzó (Día/Mes/Año) ❤️");
        }

        function fallo() {
            document.getElementById('caja').classList.add('shake');
            setTimeout(() => {
                document.getElementById('caja').classList.remove('shake');
                borrar();
            }, 400);
        }

        function entrar() {
            document.getElementById('video-fondo').style.opacity = "0";
            document.getElementById('capa-oscura').style.opacity = "0";
            document.getElementById('escena-acceso').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('escena-acceso').style.display = "none";
                document.getElementById('video-fondo').style.display = "none";
                document.getElementById('escena-playa').style.display = "flex";
                document.getElementById('vocal').play();
            }, 1000);
        }

        function siguiente() {
            alert("Cargando la Fase 3: La Carta, el Corazón y la Foto...");
        }
    </script>
</body>
</html>
